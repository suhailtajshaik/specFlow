name: "E-Commerce API Example"
description: "Example e-commerce backend API built with LLM Backend Framework"
version: "1.0.0"

# Framework configuration
framework:
  version: "1.0.0"
  llm_provider: "llamacpp"
  embedding_provider: "llamacpp"

# Project structure
directories:
  requirements: "./requirements"
  schemas: "./requirements/schemas"
  business: "./requirements/business"
  technical: "./requirements/technical"

# Build configuration
build:
  chunk_max_tokens: 512
  chunk_overlap_tokens: 50
  batch_size: 64

# API configuration
api:
  base_path: "/api/v1"
  version: "1.0"
  title: "E-Commerce API"
  description: "RESTful API for e-commerce operations"

# Default middleware
middleware:
  cors:
    enabled: true
    origins: ["*"]
  rate_limiting:
    enabled: true
    default: "100/hour/ip"
  authentication:
    jwt_secret_env: "JWT_SECRET"
    public_endpoints:
      - "GET /health"
      - "POST /api/v1/auth/register"
      - "POST /api/v1/auth/login"

# Database configuration
database:
  type: "postgresql"
  migrations_enabled: true
  connection_env: "DATABASE_URL"

# External services
services:
  email:
    enabled: true
    templates_dir: "/app/templates"
  cache:
    enabled: true
    provider: "redis"
  payments:
    enabled: false
    # provider: "stripe"

# Documentation
docs:
  generate: true
  format: "openapi"
  output: "./docs/api.yaml"