version: '3.8'

services:
  # API Gateway
  gateway:
    build:
      context: ../gateway
      dockerfile: ../docker/Dockerfile.gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LLM_PROVIDER=${LLM_PROVIDER:-llamacpp}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-app}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - API_KEYS=${API_KEYS:-}
      - LLAMACPP_BASE_URL=${LLAMACPP_BASE_URL:-http://llamacpp:8080/v1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-postgres:
        condition: service_started
      mcp-http:
        condition: service_started
      mcp-email:
        condition: service_started
      mcp-auth:
        condition: service_started
      mcp-cache:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - backend
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-app}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    restart: unless-stopped

  # MCP Servers
  mcp-postgres:
    build:
      context: ../mcp-servers/postgres
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-app}
    depends_on:
      - postgres
    networks:
      - backend
    restart: unless-stopped

  mcp-http:
    build:
      context: ../mcp-servers/http-api
    ports:
      - "3002:3002"
    networks:
      - backend
    restart: unless-stopped

  mcp-email:
    build:
      context: ../mcp-servers/email
    ports:
      - "3003:3003"
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
    networks:
      - backend
    restart: unless-stopped

  mcp-auth:
    build:
      context: ../mcp-servers/auth
    ports:
      - "3004:3004"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
    networks:
      - backend
    restart: unless-stopped

  mcp-cache:
    build:
      context: ../mcp-servers/cache
    ports:
      - "3005:3005"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - backend
    restart: unless-stopped

  # LlamaCpp Server (local profile)
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ${LLAMACPP_MODEL_PATH:-./models}:/models:ro
    command: >
      --server
      --host 0.0.0.0
      --port 8080
      --model /models/${LLAMACPP_MODEL:-qwen2.5-7b-instruct-q4_k_m.gguf}
      --ctx-size 4096
      --embeddings
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - local

  # vLLM Server (CPU)
  vllm-cpu:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    volumes:
      - ${VLLM_MODEL_PATH:-./models}:/models:ro
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --host 0.0.0.0
      --port 8000
      --max-model-len 4096
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - vllm-cpu

  # vLLM Server (GPU)
  vllm-gpu:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    volumes:
      - ${VLLM_MODEL_PATH:-./models}:/models:ro
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --host 0.0.0.0
      --port 8000
      --max-model-len 4096
      --gpu-memory-utilization 0.8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - vllm-gpu

volumes:
  qdrant_data:
  redis_data:
  postgres_data:

networks:
  backend:
    driver: bridge